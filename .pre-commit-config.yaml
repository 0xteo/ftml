exclude: '^(venv|\.venv|docs|\.git|__pycache__|\.pytest_cache|\.coverage|\.mypy_cache|\.cache|\.temp|\.tmp|\*.pyc)/'

repos:
  - repo: https://github.com/asottile/add-trailing-comma
    rev: v3.1.0
    hooks:
    -   id: add-trailing-comma

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: debug-statements
      - id: trailing-whitespace
        exclude: \.(md|rst)$
      - id: end-of-file-fixer
      - id: check-ast
      - id: check-added-large-files
        args: [ --maxkb=5000 ]
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: detect-private-key

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.19.0
    hooks:
      - id: pyupgrade
        args: [--py313-plus]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
